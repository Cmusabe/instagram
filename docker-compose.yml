services:
  selenium:
    image: selenium/standalone-chrome:latest
    restart: unless-stopped
    shm_size: "2gb"
    ports:
      - "4444:4444"
      - "7900:7900"
    environment:
      - SE_NODE_SESSION_TIMEOUT=3600
      - SE_VNC_NO_PASSWORD=1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4444/wd/hub/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      selenium:
        condition: service_healthy
    working_dir: /app
    command: ["python", "-u", "cancel_pending_requests.py"]
    environment:
      - SELENIUM_REMOTE_URL=http://selenium:4444/wd/hub
      - NON_INTERACTIVE=1
      - LOGIN_MODE=auto
      - INSTAGRAM_USERNAME=${INSTAGRAM_USERNAME}
      - INSTAGRAM_PASSWORD=${INSTAGRAM_PASSWORD}
      - BOT_DELAY=${BOT_DELAY:-3}
    volumes:
      - ./:/app
